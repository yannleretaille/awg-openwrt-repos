name: Sync Releases

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync mode"
        type: choice
        required: true
        default: incremental
        options:
          - incremental
          - backfill
          - clean-rebuild
      publish_branch:
        description: "Destination Branch"
        required: true
        default: published-repos
      dry_run:
        description: "Dry run"
        type: boolean
        required: true
        default: false
      force_collision_override:
        description: "Override collision checks"
        type: boolean
        required: true
        default: false
      sign_repos:
        description: "Sign repositories"
        type: boolean
        required: true
        default: true
  schedule:
    - cron: "19 * * * *"

concurrency:
  group: sync-releases-${{ github.event_name == 'schedule' && 'published-repos' || inputs.publish_branch }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install signing tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y signify-openbsd

      - name: Install apk-tools-static
        run: |
          set -euo pipefail
          BASE_URL="https://dl-cdn.alpinelinux.org/alpine/v3.23/main/x86_64"
          APK_FILE="$(
            curl -fsSL "${BASE_URL}/" \
              | grep -oE 'apk-tools-static-3[^"]+\.apk' \
              | sort -V \
              | tail -n1
          )"
          if [[ -z "${APK_FILE}" ]]; then
            echo "Failed to resolve apk-tools-static package from ${BASE_URL}" >&2
            exit 1
          fi

          WORK_DIR="$(mktemp -d)"
          trap 'rm -rf "${WORK_DIR}"' EXIT
          curl -fsSL "${BASE_URL}/${APK_FILE}" -o "${WORK_DIR}/${APK_FILE}"
          tar -xzf "${WORK_DIR}/${APK_FILE}" -C "${WORK_DIR}"

          mkdir -p "${RUNNER_TEMP}/bin"
          cp "${WORK_DIR}/sbin/apk.static" "${RUNNER_TEMP}/bin/apk"
          chmod +x "${RUNNER_TEMP}/bin/apk"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Run sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODE: ${{ github.event_name == 'schedule' && 'incremental' || inputs.mode }}
          PUBLISH_BRANCH: ${{ github.event_name == 'schedule' && 'published-repos' || inputs.publish_branch }}
          DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || inputs.dry_run }}
        run: |
          set -euo pipefail
          ARGS=(--mode "$MODE" --publish-branch "$PUBLISH_BRANCH")
          if [[ "$DRY_RUN" == "true" ]]; then
            ARGS+=(--dry-run)
          fi
          ./scripts/sync_releases.py "${ARGS[@]}"

      - name: Build OPKG repos
        if: ${{ github.event_name == 'schedule' || inputs.dry_run != true }}
        env:
          FORCE_COLLISION_OVERRIDE: ${{ github.event_name == 'schedule' && 'false' || inputs.force_collision_override }}
          SIGN_REPOS: ${{ github.event_name == 'schedule' && 'true' || inputs.sign_repos }}
          PRIV_OPKG_SIGNING_KEY: ${{ secrets.PRIV_OPKG_SIGNING_KEY }}
          PRIV_APK_SIGNING_KEY: ${{ secrets.PRIV_APK_SIGNING_KEY }}
        run: |
          set -euo pipefail
          ARGS=(--clean)
          if [[ "$FORCE_COLLISION_OVERRIDE" == "true" ]]; then
            ARGS+=(--force-collision-override)
          fi
          if [[ "$SIGN_REPOS" == "true" ]]; then
            if [[ -z "${PRIV_OPKG_SIGNING_KEY:-}" || -z "${PRIV_APK_SIGNING_KEY:-}" ]]; then
              echo "Signing enabled but required secrets are missing (PRIV_OPKG_SIGNING_KEY / PRIV_APK_SIGNING_KEY)." >&2
              exit 1
            fi
            if [[ ! -f keys/opkg-usign.pub || ! -f keys/apk-signing.rsa.pub ]]; then
              echo "Signing enabled but public keys are missing in repo keys/ directory." >&2
              exit 1
            fi

            SIGN_DIR="${RUNNER_TEMP}/signing"
            KEYS_DIR="${SIGN_DIR}/keys"
            mkdir -p "${KEYS_DIR}"
            umask 077
            # signify-openbsd requires keyname.sec + keyname.pub naming.
            printf '%s\n' "${PRIV_OPKG_SIGNING_KEY}" > "${SIGN_DIR}/opkg-signing.sec"
            printf '%s\n' "${PRIV_APK_SIGNING_KEY}" > "${SIGN_DIR}/PRIVATE_apk-signing.rsa"
            cp "keys/opkg-usign.pub" "${SIGN_DIR}/opkg-signing.pub"
            cp "keys/opkg-usign.pub" "${KEYS_DIR}/opkg-usign.pub"
            cp "keys/apk-signing.rsa.pub" "${KEYS_DIR}/apk-signing.rsa.pub"
            chmod 600 "${SIGN_DIR}/opkg-signing.sec" "${SIGN_DIR}/PRIVATE_apk-signing.rsa"

            ARGS+=(--sign-key "${SIGN_DIR}/opkg-signing.sec")
          fi
          ./scripts/build_opkg_repo.py "${ARGS[@]}"

      - name: Build APK repos
        if: ${{ github.event_name == 'schedule' || inputs.dry_run != true }}
        env:
          FORCE_COLLISION_OVERRIDE: ${{ github.event_name == 'schedule' && 'false' || inputs.force_collision_override }}
          SIGN_REPOS: ${{ github.event_name == 'schedule' && 'true' || inputs.sign_repos }}
          PRIV_OPKG_SIGNING_KEY: ${{ secrets.PRIV_OPKG_SIGNING_KEY }}
          PRIV_APK_SIGNING_KEY: ${{ secrets.PRIV_APK_SIGNING_KEY }}
        run: |
          set -euo pipefail
          ARGS=(--clean)
          if [[ "$FORCE_COLLISION_OVERRIDE" == "true" ]]; then
            ARGS+=(--force-collision-override)
          fi
          if [[ "$SIGN_REPOS" == "true" ]]; then
            if [[ -z "${PRIV_OPKG_SIGNING_KEY:-}" || -z "${PRIV_APK_SIGNING_KEY:-}" ]]; then
              echo "Signing enabled but required secrets are missing (PRIV_OPKG_SIGNING_KEY / PRIV_APK_SIGNING_KEY)." >&2
              exit 1
            fi
            if [[ ! -f keys/opkg-usign.pub || ! -f keys/apk-signing.rsa.pub ]]; then
              echo "Signing enabled but public keys are missing in repo keys/ directory." >&2
              exit 1
            fi

            SIGN_DIR="${RUNNER_TEMP}/signing"
            KEYS_DIR="${SIGN_DIR}/keys"
            mkdir -p "${KEYS_DIR}"
            umask 077
            # Keep OPKG key material shape consistent across steps.
            printf '%s\n' "${PRIV_OPKG_SIGNING_KEY}" > "${SIGN_DIR}/opkg-signing.sec"
            printf '%s\n' "${PRIV_APK_SIGNING_KEY}" > "${SIGN_DIR}/PRIVATE_apk-signing.rsa"
            cp "keys/opkg-usign.pub" "${SIGN_DIR}/opkg-signing.pub"
            cp "keys/opkg-usign.pub" "${KEYS_DIR}/opkg-usign.pub"
            cp "keys/apk-signing.rsa.pub" "${KEYS_DIR}/apk-signing.rsa.pub"
            chmod 600 "${SIGN_DIR}/opkg-signing.sec" "${SIGN_DIR}/PRIVATE_apk-signing.rsa"

            ARGS+=(--sign-key "${SIGN_DIR}/PRIVATE_apk-signing.rsa" --keys-dir "${KEYS_DIR}")
          fi
          ./scripts/build_apk_repo.py "${ARGS[@]}"

      - name: Copy public signing keys to output
        if: ${{ (github.event_name == 'schedule' || inputs.dry_run != true) && (github.event_name == 'schedule' || inputs.sign_repos == true) }}
        run: |
          set -euo pipefail
          mkdir -p output/keys
          cp keys/opkg-usign.pub output/keys/opkg-usign.pub
          cp keys/apk-signing.rsa.pub output/keys/apk-signing.rsa.pub

      - name: Generate REPOS.md
        if: ${{ github.event_name == 'schedule' || inputs.dry_run != true }}
        run: |
          set -euo pipefail
          ./scripts/generate_repos_md.py

      - name: Upload output artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: sync-output
          path: |
            output/
            state/
          if-no-files-found: warn

  publish:
    needs: sync
    if: ${{ needs.sync.result == 'success' && (github.event_name == 'schedule' || inputs.dry_run != true) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      PUBLISH_BRANCH: ${{ github.event_name == 'schedule' && 'published-repos' || inputs.publish_branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: sync-output
          path: .

      - name: Prepare publish PR branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ ! -d output/repos ]]; then
            echo "output/repos not found, nothing to publish"
            exit 0
          fi
          if [[ ! -f output/REPOS.md ]]; then
            echo "output/REPOS.md not found, nothing to publish"
            exit 0
          fi

          safe_publish_branch="$(echo "${PUBLISH_BRANCH}" | tr '/ ' '--')"
          # Keep head branch stable so each run updates the same PR.
          HEAD_BRANCH="publish-staging-${safe_publish_branch}"

          publish_dir="$(mktemp -d)"
          trap 'rm -rf "$publish_dir"' EXIT
          cd "$publish_dir"

          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          BASE_EXISTS=false
          if git fetch --depth=1 origin "${PUBLISH_BRANCH}"; then
            BASE_EXISTS=true
            git checkout -B "${HEAD_BRANCH}" "origin/${PUBLISH_BRANCH}"
          else
            git checkout --orphan "${HEAD_BRANCH}"
          fi

          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          mkdir -p repos
          mkdir -p meta
          mkdir -p keys
          cp -a "${GITHUB_WORKSPACE}/output/repos/." repos/
          cp "${GITHUB_WORKSPACE}/output/REPOS.md" REPOS.md
          if [[ -d "${GITHUB_WORKSPACE}/output/keys" ]]; then
            cp -a "${GITHUB_WORKSPACE}/output/keys/." keys/
          fi

          for f in \
            openwrt_versions.json \
            opkg_repo_report.json \
            apk_repo_report.json \
            opkg_coverage_report.json \
            apk_coverage_report.json \
            opkg_collision_report.json \
            apk_collision_report.json
          do
            src="${GITHUB_WORKSPACE}/output/manifests/index/${f}"
            if [[ -f "${src}" ]]; then
              cp "${src}" "meta/${f}"
            fi
          done

          git add -A
          if git diff --cached --quiet; then
            echo "No publish changes detected"
            exit 0
          fi

          git commit --quiet -m "chore(publish): update generated repos"
          # Bot-only staging branch: use --force for deterministic updates from ephemeral CI clones.
          # If humans ever push to staging, switch to:
          #   git fetch --depth=1 origin "${HEAD_BRANCH}:${HEAD_BRANCH}" || true
          #   git push --force-with-lease origin "${HEAD_BRANCH}"
          git push --force origin "${HEAD_BRANCH}"

          if [[ "${BASE_EXISTS}" != "true" ]]; then
            echo "Base branch ${PUBLISH_BRANCH} does not exist yet; initializing from ${HEAD_BRANCH}"
            git push origin "${HEAD_BRANCH}:${PUBLISH_BRANCH}"
            exit 0
          fi

          existing_pr="$(gh pr list \
            --base "${PUBLISH_BRANCH}" \
            --head "${HEAD_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number')"

          if [[ -n "${existing_pr}" ]]; then
            gh pr edit "${existing_pr}" \
              --title "chore(publish): update generated repos for ${PUBLISH_BRANCH}" \
              --body "Automated publish update from workflow run ${GITHUB_RUN_ID}."
            echo "Updated PR #${existing_pr}"
          else
            gh pr create \
              --base "${PUBLISH_BRANCH}" \
              --head "${HEAD_BRANCH}" \
              --title "chore(publish): update generated repos for ${PUBLISH_BRANCH}" \
              --body "Automated publish update from workflow run ${GITHUB_RUN_ID}."
          fi
